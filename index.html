<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СТЭМ Реновацио - Дашборды</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#F0F4F8; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.wrap { width:100%; max-width:560px; padding:20px; }
.header { background:#1F3864; border-radius:10px; padding:24px 28px; margin-bottom:20px; }
.header h1 { color:#fff; font-size:20px; }
.header p  { color:#CADCFC; font-size:12px; margin-top:4px; }
.card { background:#fff; border-radius:10px; border:1px solid #CBD5E0; padding:22px 28px; margin-bottom:14px;
        text-decoration:none; display:block; box-shadow:0 1px 4px rgba(0,0,0,.06);
        transition: box-shadow .15s, transform .15s; }
.card:hover { box-shadow:0 4px 12px rgba(0,0,0,.12); transform:translateY(-2px); }
.card-label { font-size:10px; font-weight:bold; text-transform:uppercase; margin-bottom:6px; }
.card-title { font-size:17px; font-weight:bold; color:#1A202C; margin-bottom:4px; }
.card-desc  { font-size:12px; color:#718096; }
.c1 .card-label { color:#2E5496; }
.c2 .card-label { color:#27AE60; }
.arrow { float:right; font-size:20px; color:#CBD5E0; margin-top:2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>СТЭМ Реновацио</h1>
    <p>Аналитические дашборды</p>
  </div>

  <a class="card c1" href="./analytics/">
    <span class="arrow">›</span>
    <div class="card-label">Аналитика продаж</div>
    <div class="card-title">Дашборд продаж 2025-2026</div>
    <div class="card-desc">Каналы, продукты, контрагенты, ОЗОН - детальная аналитика</div>
  </a>

  <a class="card c2" href="./forecast/">
    <span class="arrow">›</span>
    <div class="card-label">Прогноз</div>
    <div class="card-title">Прогноз продаж 2026</div>
    <div class="card-desc">Сценарии, план по продуктам, ключевые точки роста</div>
  </a>
</div>
</body>
</html>
